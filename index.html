<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>3hit90 – O12 HUB (iki1uc)</title>

<style>
body{background:#000;color:#0f0;font-family:Consolas;padding:20px;}
h1{color:#6cf;}
pre{background:#111;padding:12px;border:1px solid #333;margin-top:20px;}
button{background:#111;color:#0f0;border:1px solid #333;padding:8px 16px;margin:4px;}
</style>
</head>

<body>

<h1>3hit90 – O12 HUB</h1>
<p>TΩ + XU + Φ4 → O12 (OctaCore² + 12D‑Fusion)</p>

<button onclick="pulse()">RUN8 Pulse</button>
<button onclick="loadCube()">RESPO Cube</button>
<button onclick="loadTime()">TIME 3×11</button>

<pre id="out">Bereit...</pre>

<script type="module">
import { O12 } from "./O12.js";
import { run8 } from "./RUN8.js";
import { loadRESPO } from "./RESPO.js";
import { TIME } from "./TIME.js";
import { PHI4 } from "./PHI4.js";

// ------------------------------------------------------
// HUB – alles zusammenführen
// ------------------------------------------------------
function pulse(){
  const p = run8("pulse");
  out.textContent = JSON.stringify({
    hub: "3hit90",
    o12: O12,
    phi4: PHI4,
    pulse: p,
    stamp: Date.now()
  }, null, 2);
}

async function loadCube(){
  const cube = await loadRESPO("cube");
  out.textContent = JSON.stringify({
    hub: "3hit90",
    cube,
    stamp: Date.now()
  }, null, 2);
}

function loadTime(){
  out.textContent = JSON.stringify({
    hub: "3hit90",
    time: TIME,
    stamp: Date.now()
  }, null, 2);
}
</script>

</body>
</html>
