<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>3hit90 – O12 HUB</title>

<style>
body { background:#000; color:#0f0; font-family:Consolas, monospace; padding:20px; }
h1, h2 { color:#6cf; }
button { background:#111; color:#0f0; border:1px solid #333; padding:8px 16px; margin:4px; }
pre { background:#111; padding:12px; border:1px solid #333; margin-top:20px; }
</style>

</head>
<body>

<h1>3hit90 – O12 HUB</h1>
<p>TΩ + XU + Φ4 → O12 (OctaCore² + 12D‑Fusion)</p>

<button onclick="pulse()">RUN8 Pulse</button>
<button onclick="loadCube()">RESPO Cube</button>
<button onclick="loadTime()">TIME 3×11</button>
<button onclick="loadPhi()">Φ4 Achsen</button>
<button onclick="loadBRM()">BRM Modul</button>
<button onclick="loadO12()">O12 Engine</button>

<pre id="out">Bereit...</pre>

<script>
// ------------------------------------------------------
// ALTES 3hit90 – FUNKTIONIERENDE TRIGGER
// ------------------------------------------------------

// RUN8
function pulse(){
  const p = {
    engine: "RUN8",
    mode: "pulse",
    stamp: Date.now()
  };
  out.textContent = JSON.stringify(p, null, 2);
}

// RESPO Cube
async function loadCube(){
  const res = await fetch("./RESPO/cube.html").then(r => r.text()).catch(()=>null);
  out.textContent = res ? res : "Cube nicht gefunden";
}

// TIME
function loadTime(){
  const t = {
    raster: "3×11",
    rows: 3,
    cols: 11,
    stamp: Date.now()
  };
  out.textContent = JSON.stringify(t, null, 2);
}

// Φ4
function loadPhi(){
  const phi = {
    phi: "Φ",
    phi1: "φ",
    phi2: "φ²",
    phiinfty: "φ∞",
    stamp: Date.now()
  };
  out.textContent = JSON.stringify(phi, null, 2);
}

// BRM
async function loadBRM(){
  const res = await fetch("./BRM/BRM.json").then(r => r.json()).catch(()=>null);
  out.textContent = JSON.stringify(res || "BRM nicht gefunden", null, 2);
}

// O12
function loadO12(){
  const o12 = {
    core: "OctaCore²",
    fusion: "12D",
    geo: ["TΩ","XU","Φ4"],
    stamp: Date.now()
  };
  out.textContent = JSON.stringify(o12, null, 2);
}
</script>

</body>
</html>
