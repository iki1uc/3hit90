<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TIME 3×11 – Scroll + Zoom</title>
<style>
body { font-family:Consolas; }
.cell { padding:4px; display:inline-block; width:60px; }
</style>
</head>
<body>

<h1>TIME 3×11 – Scroll + Zoom</h1>

<div id="grid"></div>

<button onclick="zoomIn()">ZOOM +</button>
<button onclick="zoomOut()">ZOOM −</button>
<button onclick="resetZoom()">RESET</button>

<script>
let z = 1;
function zoomIn(){ z+=0.1; document.body.style.zoom = z; }
function zoomOut(){ z-=0.1; document.body.style.zoom = z; }
function resetZoom(){ z=1; document.body.style.zoom = 1; }

let g = document.getElementById("grid");
for(let r=1;r<=3;r++){
  for(let c=1;c<=11;c++){
    g.innerHTML += `<div class="cell">R${r}C${c}</div>`;
  }
  g.innerHTML += "<br>";
}
</script>

</body>
</html>
